name: Android Debug APK

on:
  push:
    branches: [main]
    paths-ignore:
      - "apk/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GODOT_ANDROID_KEYSTORE_DEBUG_PATH: /tmp/godottest1/debug.keystore
      GODOT_ANDROID_KEYSTORE_DEBUG_USER: androiddebugkey
      GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD: android
      GODOT_ANDROID_KEYSTORE_RELEASE_PATH: /tmp/godottest1/debug.keystore
      GODOT_ANDROID_KEYSTORE_RELEASE_USER: androiddebugkey
      GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD: android

    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Create temporary debug keystore
        run: |
          mkdir -p /tmp/godottest1 .godot build "$HOME/.config/godot"
          keytool -genkeypair -v \
            -keystore "$GODOT_ANDROID_KEYSTORE_DEBUG_PATH" \
            -storepass "$GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD" \
            -alias "$GODOT_ANDROID_KEYSTORE_DEBUG_USER" \
            -keypass "$GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=GodotTest1,C=KR"
          touch .godot/export_credentials.cfg

      # v4.2.0 installs JDK 17, Android SDK, Godot, export templates, and
      # the Android build template. Its final internal export is release-mode.
      - name: Set up Godot Android export environment
        uses: dulvui/godot-android-export@v4.2.0
        continue-on-error: true # The archived action hardcodes an unused release export.
        with:
          godot-version: 4.5
          godot-channel: stable
          working-directory: .

      - name: Set up .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install official Godot 4.5 .NET editor and Mono templates
        env:
          GODOT_RELEASE: 4.5-stable
        run: |
          curl -fL --retry 5 --retry-delay 3 \
            -o "$RUNNER_TEMP/godot-mono.zip" \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_RELEASE}/Godot_v4.5-stable_mono_linux_x86_64.zip"
          unzip -q "$RUNNER_TEMP/godot-mono.zip" -d "$RUNNER_TEMP/godot-mono"
          sudo mkdir -p /opt/godot-4.5-mono
          sudo cp -R "$RUNNER_TEMP/godot-mono/Godot_v4.5-stable_mono_linux_x86_64/." /opt/godot-4.5-mono/
          sudo ln -sf /opt/godot-4.5-mono/Godot_v4.5-stable_mono_linux.x86_64 /usr/local/bin/godot
          curl -fL --retry 5 --retry-delay 3 \
            -o "$RUNNER_TEMP/godot-mono-templates.tpz" \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_RELEASE}/Godot_v4.5-stable_mono_export_templates.tpz"
          mkdir -p "$RUNNER_TEMP/godot-mono-templates" "$HOME/.local/share/godot/export_templates/4.5.stable.mono"
          unzip -q "$RUNNER_TEMP/godot-mono-templates.tpz" -d "$RUNNER_TEMP/godot-mono-templates"
          cp -R "$RUNNER_TEMP/godot-mono-templates/templates/." "$HOME/.local/share/godot/export_templates/4.5.stable.mono/"
          godot --version | grep -F '4.5.stable.mono'
          dotnet --version

      - name: Configure Godot Java SDK path
        run: |
          sed -i '/export\/android\/java_sdk_path/d' ~/.config/godot/editor_settings-4.tres
          printf '\nexport/android/java_sdk_path = "%s"\n' "$JAVA_HOME" >> ~/.config/godot/editor_settings-4.tres

      # Keep the APK delivery gate intentionally short. Exhaustive AI,
      # balance, stress, board-render and 28-capture visual suites remain
      # available as the documented local/full verification path.
      - name: Run fast APK verification
        run: |
          dotnet build --nologo
          godot --headless --path . --import
          godot --headless --path . -s tests/run_dotnet_port.gd
          godot --headless --path . -s tests/run_rules.gd
          godot --headless --path . -s tests/run_game_flow.gd
          godot --headless --path . -s tests/validate_unit_atlas.gd
          godot --headless --path . --scene res://scenes/main.tscn --quit-after 180

      # The requested deliverable is debug, so overwrite the action's
      # release-mode output using the same installed 4.5 toolchain.
      - name: Export debug APK
        run: |
          godot --headless --path . --export-debug Android build/godottest1.apk
          test -s build/godottest1.apk
          unzip -l build/godottest1.apk | grep -Fq 'assets/.godot/mono/publish/arm64/godottest1.dll'
          apk_signer_bin="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -1)"
          test -n "$apk_signer_bin"
          "$apk_signer_bin" verify --verbose build/godottest1.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: godottest1-debug-apk
          path: build/godottest1.apk
          if-no-files-found: error
          retention-days: 14
